name: Site checks
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: pip install html5validator
      - run: html5validator --root . --ignore-re 'Attribute “fetchpriority” not allowed'
      - run: python scripts/check_local_assets.py
