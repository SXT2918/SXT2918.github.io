name: Site checks
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
      - run: pip install html5validator
      - run: >-
          html5validator --root .
          --ignore-re 'CSS:.*(inset|backdrop-filter|aspect-ratio|scrollbar-width).*|CSS:.*Unknown dimension|Attribute.*fetchpriority.*'
      - run: python scripts/check_local_assets.py
